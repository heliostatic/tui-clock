version: "2"
run:
  tests: true
linters:
  enable:
    - misspell
    - revive
    - unconvert
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - staticcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/heliostatic/tui-clock
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
